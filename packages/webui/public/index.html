<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Agnes AI</title>
  <style>
    /* ─── Reset & Base ─────────────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0f1117;
      --bg2: #1a1d27;
      --bg3: #252836;
      --border: #2e3148;
      --accent: #6c63ff;
      --accent2: #9f97ff;
      --text: #e2e4f0;
      --text2: #9ca3c0;
      --text3: #6b7280;
      --green: #4ade80;
      --red: #f87171;
      --yellow: #fbbf24;
      --radius: 12px;
      --radius-sm: 8px;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ─── Layout ───────────────────────────────────────────────────────────── */
    .app { display: flex; height: 100vh; overflow: hidden; }
    .sidebar {
      width: 240px;
      flex-shrink: 0;
      background: var(--bg2);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

    /* ─── Sidebar ──────────────────────────────────────────────────────────── */
    .sidebar-logo {
      padding: 20px 16px 16px;
      font-size: 18px;
      font-weight: 700;
      color: var(--accent2);
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; gap: 8px;
    }
    .sidebar-logo span { font-size: 22px; }
    .sidebar-nav { padding: 12px 8px; flex: 1; }
    .nav-item {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 12px;
      border-radius: var(--radius-sm);
      cursor: pointer;
      color: var(--text2);
      font-size: 14px;
      transition: all 0.15s;
      user-select: none;
    }
    .nav-item:hover { background: var(--bg3); color: var(--text); }
    .nav-item.active { background: var(--accent); color: #fff; }
    .nav-item .icon { font-size: 18px; flex-shrink: 0; }
    .sidebar-footer {
      padding: 12px 8px 16px;
      border-top: 1px solid var(--border);
    }
    .config-btn {
      width: 100%;
      display: flex; align-items: center; gap: 8px;
      padding: 9px 12px;
      background: none; border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text2);
      cursor: pointer;
      font-size: 13px;
      transition: all 0.15s;
    }
    .config-btn:hover { border-color: var(--accent); color: var(--text); }

    /* ─── Header ───────────────────────────────────────────────────────────── */
    .header {
      padding: 16px 24px;
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
      background: var(--bg);
    }
    .header h1 { font-size: 16px; font-weight: 600; color: var(--text); }
    .model-select {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text);
      padding: 6px 12px;
      font-size: 13px;
      cursor: pointer;
      outline: none;
    }
    .model-select:focus { border-color: var(--accent); }

    /* ─── Panels (pages) ──────────────────────────────────────────────────── */
    .panel { display: none; flex: 1; flex-direction: column; overflow: hidden; }
    .panel.active { display: flex; }

    /* ─── Chat ─────────────────────────────────────────────────────────────── */
    .chat-messages {
      flex: 1; overflow-y: auto;
      padding: 20px 24px;
      display: flex; flex-direction: column; gap: 16px;
    }
    .message { display: flex; gap: 12px; max-width: 800px; }
    .message.user { flex-direction: row-reverse; align-self: flex-end; }
    .message-avatar {
      width: 32px; height: 32px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 16px; flex-shrink: 0;
      background: var(--bg3);
    }
    .message.user .message-avatar { background: var(--accent); }
    .message-content {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 12px 16px;
      font-size: 14px;
      line-height: 1.6;
      max-width: 640px;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .message.user .message-content { background: var(--accent); border-color: var(--accent); color: #fff; }
    .message-content code {
      background: var(--bg3);
      padding: 2px 5px;
      border-radius: 4px;
      font-family: 'Fira Code', 'Cascadia Code', monospace;
      font-size: 0.9em;
    }
    .message-content pre { background: var(--bg3); border-radius: 8px; padding: 12px; overflow-x: auto; margin: 8px 0; }
    .message-content pre code { background: none; padding: 0; }
    .chat-input-wrap {
      padding: 16px 24px;
      background: var(--bg);
      border-top: 1px solid var(--border);
    }
    .chat-options { display: flex; gap: 12px; margin-bottom: 10px; align-items: center; flex-wrap: wrap; }
    .chat-option-label { font-size: 12px; color: var(--text2); display: flex; align-items: center; gap: 4px; cursor: pointer; }
    .chat-input-row {
      display: flex; gap: 10px; align-items: flex-end;
    }
    textarea.chat-textarea {
      flex: 1;
      min-height: 52px; max-height: 200px;
      padding: 12px 16px;
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-size: 14px;
      resize: none;
      outline: none;
      transition: border-color 0.15s;
      font-family: inherit;
      line-height: 1.5;
    }
    textarea.chat-textarea:focus { border-color: var(--accent); }
    .send-btn {
      height: 52px; padding: 0 20px;
      background: var(--accent);
      border: none; border-radius: var(--radius);
      color: #fff; font-size: 14px; font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s;
      white-space: nowrap;
    }
    .send-btn:hover { opacity: 0.85; }
    .send-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    /* ─── Image Panel ──────────────────────────────────────────────────────── */
    .gen-panel { flex: 1; overflow-y: auto; padding: 24px; }
    .gen-form { max-width: 720px; display: flex; flex-direction: column; gap: 16px; }
    .form-group { display: flex; flex-direction: column; gap: 6px; }
    label.form-label { font-size: 13px; font-weight: 600; color: var(--text2); }
    input[type="text"], input[type="url"], select, textarea.gen-textarea {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text);
      padding: 9px 12px;
      font-size: 14px;
      outline: none;
      transition: border-color 0.15s;
      font-family: inherit;
    }
    input[type="text"]:focus, input[type="url"]:focus, select:focus, textarea.gen-textarea:focus {
      border-color: var(--accent);
    }
    textarea.gen-textarea { min-height: 80px; resize: vertical; }
    .row-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .gen-result {
      max-width: 720px;
      margin-top: 20px;
    }
    .result-image-wrap {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
    }
    .result-image-wrap img {
      max-width: 100%;
      display: block;
    }
    .result-meta {
      padding: 12px 16px;
      font-size: 12px;
      color: var(--text2);
      display: flex; gap: 12px; align-items: center; flex-wrap: wrap;
    }
    .result-meta a { color: var(--accent2); text-decoration: none; }
    .result-meta a:hover { text-decoration: underline; }
    .generate-btn {
      padding: 12px 28px;
      background: var(--accent);
      border: none; border-radius: var(--radius);
      color: #fff; font-size: 15px; font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s;
      align-self: flex-start;
    }
    .generate-btn:hover { opacity: 0.85; }
    .generate-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    /* ─── Upload Zone ──────────────────────────────────────────────────────── */
    .upload-zone {
      border: 2px dashed var(--border);
      border-radius: var(--radius);
      padding: 24px 20px;
      text-align: center;
      color: var(--text2);
      font-size: 13px;
      cursor: pointer;
      transition: all 0.2s;
      min-height: 80px;
      display: flex; align-items: center; justify-content: center;
      flex-direction: column; gap: 6px;
    }
    .upload-zone:hover { border-color: var(--accent); background: rgba(108, 99, 255, 0.04); }
    .upload-zone.drag-over { border-color: var(--accent2); background: rgba(108, 99, 255, 0.08); color: var(--accent2); }
    .upload-zone.has-file { border-color: var(--green); color: var(--green); }
    .upload-zone input { display: none; }
    .upload-zone .upload-hint { font-size: 12px; color: var(--text3); }

    .upload-preview-list {
      display: flex; flex-wrap: wrap; gap: 8px; margin-top: 8px;
    }
    .upload-preview-item {
      position: relative;
      width: 64px; height: 64px; border-radius: 6px;
      overflow: hidden; border: 1px solid var(--border);
    }
    .upload-preview-item img { width: 100%; height: 100%; object-fit: cover; }
    .upload-preview-item .remove-btn {
      position: absolute; top: 2px; right: 2px;
      width: 18px; height: 18px; border-radius: 50%;
      background: rgba(0,0,0,0.7); color: #fff;
      border: none; cursor: pointer; font-size: 11px;
      display: flex; align-items: center; justify-content: center;
      line-height: 1;
    }

    /* ─── Video Panel ──────────────────────────────────────────────────────── */
    .video-progress {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px;
      margin-top: 16px;
    }
    .progress-bar-wrap { background: var(--bg3); border-radius: 4px; height: 8px; overflow: hidden; margin: 8px 0; }
    .progress-bar { height: 100%; background: var(--accent); border-radius: 4px; transition: width 0.3s; }
    .progress-text { font-size: 13px; color: var(--text2); }
    video { max-width: 100%; border-radius: var(--radius); margin-top: 12px; }

    /* ─── Config Modal ─────────────────────────────────────────────────────── */
    .modal-overlay {
      display: none;
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.6);
      z-index: 1000;
      align-items: center; justify-content: center;
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 28px;
      width: 440px;
      max-width: 95vw;
    }
    .modal h2 { font-size: 18px; margin-bottom: 20px; }
    .modal-footer { display: flex; gap: 10px; justify-content: flex-end; margin-top: 20px; }
    .btn-cancel {
      padding: 9px 20px;
      background: none;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text2);
      cursor: pointer;
      font-size: 14px;
    }
    .btn-save {
      padding: 9px 20px;
      background: var(--accent);
      border: none;
      border-radius: var(--radius-sm);
      color: #fff;
      cursor: pointer;
      font-size: 14px;
      font-weight: 600;
    }

    /* ─── Toast ────────────────────────────────────────────────────────────── */
    .toast {
      position: fixed; bottom: 24px; right: 24px;
      background: var(--bg3); border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 12px 20px;
      font-size: 14px;
      z-index: 2000;
      transform: translateY(80px); opacity: 0;
      transition: all 0.3s;
    }
    .toast.show { transform: translateY(0); opacity: 1; }
    .toast.success { border-color: var(--green); color: var(--green); }
    .toast.error { border-color: var(--red); color: var(--red); }

    /* ─── Spinner ──────────────────────────────────────────────────────────── */
    .spinner {
      display: inline-block; width: 16px; height: 16px;
      border: 2px solid var(--border); border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ─── Scrollbar ────────────────────────────────────────────────────────── */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--bg3); border-radius: 3px; }
  </style>
</head>
<body>

<div class="app">
  <!-- ─── Sidebar ─────────────────────────────────────────────────────────── -->
  <div class="sidebar">
    <div class="sidebar-logo">
      <span>✦</span> Agnes AI
    </div>
    <nav class="sidebar-nav">
      <div class="nav-item active" data-panel="chat">
        <span class="icon">💬</span> 文本对话
      </div>
      <div class="nav-item" data-panel="image">
        <span class="icon">🎨</span> 图像生成
      </div>
      <div class="nav-item" data-panel="video">
        <span class="icon">🎬</span> 视频生成
      </div>
    </nav>
    <div class="sidebar-footer">
      <button class="config-btn" onclick="openConfig()">
        <span>⚙️</span> API 配置
      </button>
    </div>
  </div>

  <!-- ─── Main ──────────────────────────────────────────────────────────────── -->
  <div class="main">

    <!-- ─── Chat Panel ─────────────────────────────────────────────────────── -->
    <div class="panel active" id="panel-chat">
      <div class="header">
        <h1>文本对话</h1>
        <div style="display:flex;gap:10px;align-items:center;">
          <select class="model-select" id="chat-model">
            <option value="agnes-1.5-flash">Agnes 1.5 Flash</option>
            <option value="agnes-2.0-flash" selected>Agnes 2.0 Flash</option>
          </select>
          <button onclick="clearChat()" style="background:none;border:1px solid var(--border);color:var(--text2);padding:5px 12px;border-radius:6px;cursor:pointer;font-size:13px;">清空</button>
        </div>
      </div>
      <div class="chat-messages" id="chat-messages">
        <div class="message" style="justify-content:center;">
          <div style="color:var(--text3);font-size:13px;padding:20px 0;">选择模型，开始对话 ✦</div>
        </div>
      </div>
      <div class="chat-input-wrap">
        <div class="chat-options">
          <label class="chat-option-label">
            <input type="checkbox" id="opt-stream" checked /> 流式输出
          </label>
          <label class="chat-option-label">
            <input type="checkbox" id="opt-thinking" /> Thinking 模式
          </label>
          <label class="chat-option-label">
            <input type="checkbox" id="opt-vision" onchange="toggleVisionInput()" /> 图片理解
          </label>
          <div id="vision-input" style="display:none;">
            <input type="url" id="chat-image-url" placeholder="图片 URL" style="width:240px;font-size:13px;padding:5px 10px;" />
          </div>
        </div>
        <div class="chat-input-row">
          <textarea class="chat-textarea" id="chat-input" rows="2"
            placeholder="输入消息... (Shift+Enter 换行，Enter 发送)"
            onkeydown="handleChatKey(event)"></textarea>
          <button class="send-btn" id="send-btn" onclick="sendChat()">发送</button>
        </div>
      </div>
    </div>

    <!-- ─── Image Panel ─────────────────────────────────────────────────────── -->
    <div class="panel" id="panel-image">
      <div class="header">
        <h1>图像生成</h1>
        <select class="model-select" id="image-model">
          <option value="agnes-image-2.0-flash">Agnes Image 2.0 Flash</option>
          <option value="agnes-image-2.1-flash" selected>Agnes Image 2.1 Flash</option>
        </select>
      </div>
      <div class="gen-panel">
        <div class="gen-form">
          <div class="form-group">
            <label class="form-label">生成模式</label>
            <select id="img-mode" onchange="updateImgMode()">
              <option value="text2img">文生图 (Text to Image)</option>
              <option value="img2img">图生图 (Image to Image)</option>
              <option value="multi">多图合成 (Multi-Image)</option>
            </select>
          </div>

          <div id="img-input-section" style="display:none;">
            <div class="form-group">
              <label class="form-label">参考图片（可拖拽上传，或输入图片 URL）</label>
              <div class="upload-zone" id="img-upload-zone" onclick="document.getElementById('img-upload-file').click()">
                <input type="file" id="img-upload-file" accept="image/*" onchange="handleImgFileUpload()" multiple />
                <div><strong>📁 拖拽图片到此处，或点击选择文件</strong></div>
                <div class="upload-hint">支持多张图片，或在下方的 URL 输入框中填写</div>
              </div>
              <div class="upload-preview-list" id="img-preview-list"></div>
              <input type="url" id="img-url-input" placeholder="或输入图片 URL (https://...)" style="margin-top:8px;" />
            </div>
          </div>

          <div class="row-2">
            <div class="form-group">
              <label class="form-label">输出尺寸</label>
              <select id="img-size" onchange="toggleImgCustomSize()">
                <option value="1024x1024">1024×1024 (正方形)</option>
                <option value="1024x768" selected>1024×768 (横向 4:3)</option>
                <option value="768x1024">768×1024 (竖向 3:4)</option>
                <option value="1280x720">1280×720 (宽屏 16:9)</option>
                <option value="720x1280">720×1280 (竖版 9:16)</option>
                <option value="1920x1080">1920×1080 (全高清)</option>
                <option value="custom">🖊 自定义尺寸</option>
              </select>
            </div>
            <div class="form-group">
              <label class="form-label">风格预设</label>
              <select id="img-style">
                <option value="">无 (不附加风格)</option>
                <option value="photorealistic, professional photography, high detail" selected>写实摄影</option>
                <option value="cinematic, dramatic lighting, film grain, movie still">电影感</option>
                <option value="anime style, vibrant colors, detailed illustration">动漫插画</option>
                <option value="oil painting style, brush strokes, artistic">油画艺术</option>
                <option value="watercolor illustration, soft colors, artistic">水彩插画</option>
                <option value="3D render, CGI, octane render, high quality">3D 渲染</option>
                <option value="flat design, minimal, vector art, clean">扁平设计</option>
              </select>
            </div>
          </div>

          <!-- Custom image size inputs (shown when "自定义尺寸" selected) -->
          <div class="row-2" id="img-custom-size-row" style="display:none;">
            <div class="form-group">
              <label class="form-label">自定义宽度 (px)</label>
              <input type="number" id="img-custom-w" placeholder="例如 1920" value="1920" min="64" max="4096" />
            </div>
            <div class="form-group">
              <label class="form-label">自定义高度 (px)</label>
              <input type="number" id="img-custom-h" placeholder="例如 1080" value="1080" min="64" max="4096" />
            </div>
          </div>

          <div class="form-group">
            <label class="form-label">提示词 (Prompt)</label>
            <textarea class="gen-textarea" id="img-prompt" placeholder="描述你想生成的图像..."></textarea>
          </div>

          <button class="generate-btn" id="img-gen-btn" onclick="generateImage()">🎨 生成图像</button>
        </div>

        <div class="gen-result" id="img-result" style="display:none;">
          <div class="result-image-wrap">
            <img id="result-img" src="" alt="Generated image" />
            <div class="result-meta">
              <span id="result-img-info"></span>
              <a id="result-img-link" href="#" target="_blank" download>⬇ 下载</a>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- ─── Video Panel ─────────────────────────────────────────────────────── -->
    <div class="panel" id="panel-video">
      <div class="header">
        <h1>视频生成</h1>
        <select class="model-select" id="video-model">
          <option value="agnes-video-v2.0" selected>Agnes Video V2.0</option>
        </select>
      </div>
      <div class="gen-panel">
        <div class="gen-form">
          <div class="form-group">
            <label class="form-label">生成模式</label>
            <select id="vid-mode" onchange="updateVidMode()">
              <option value="text2vid">文生视频 (Text to Video)</option>
              <option value="img2vid">图生视频 (Image to Video)</option>
              <option value="multi">多图视频 (Multi-Image)</option>
              <option value="keyframes">关键帧动画 (Keyframe)</option>
            </select>
          </div>

          <div id="vid-input-section" style="display:none;">
            <div class="form-group">
              <label class="form-label">参考图片（可拖拽上传，或输入图片 URL）</label>
              <div class="upload-zone" id="vid-upload-zone" onclick="document.getElementById('vid-upload-file').click()">
                <input type="file" id="vid-upload-file" accept="image/*" onchange="handleVidFileUpload()" multiple />
                <div><strong>📁 拖拽图片到此处，或点击选择文件</strong></div>
                <div class="upload-hint">图生视频只需要一张参考图，多图/关键帧模式可上传多张</div>
              </div>
              <div class="upload-preview-list" id="vid-preview-list"></div>
              <input type="url" id="vid-url-input" placeholder="或输入图片 URL (https://...)" style="margin-top:8px;" />
            </div>
          </div>

          <div class="row-2">
            <div class="form-group">
              <label class="form-label">视频尺寸</label>
              <select id="vid-size" onchange="toggleVidCustom('size')">
                <option value="1216x832">1216×832 (默认)</option>
                <option value="1152x768">1152×768</option>
                <option value="1088x640">1088×640 (16:9)</option>
                <option value="960x576">960×576</option>
                <option value="custom">🖊 自定义</option>
              </select>
            </div>
            <div class="form-group">
              <label class="form-label">帧数 (num_frames)</label>
              <select id="vid-frames" onchange="toggleVidCustom('frames')">
                <option value="81">81 帧 (~3秒)</option>
                <option value="121" selected>121 帧 (~5秒)</option>
                <option value="241">241 帧 (~10秒)</option>
                <option value="441">441 帧 (~18秒)</option>
                <option value="custom">🖊 自定义</option>
              </select>
            </div>
          </div>

// Chat
// ============================================================================
let chatHistory = [];
const chatMessages = document.getElementById('chat-messages');

function clearChat() {
  chatHistory = [];
  chatMessages.innerHTML = `<div class="message" style="justify-content:center;"><div style="color:var(--text3);font-size:13px;padding:20px 0;">选择模型，开始对话 ✦</div></div>`;
}

function escapeHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');
}

function appendMessage(role, content) {
  const div = document.createElement('div');
  div.className = 'message ' + (role === 'user' ? 'user' : '');
  div.innerHTML = `
    <div class="message-avatar">${role === 'user' ? '👤' : '✦'}</div>
    <div class="message-content">${escapeHtml(content)}</div>
  `;
  chatMessages.appendChild(div);
  chatMessages.scrollTop = chatMessages.scrollHeight;
  return div.querySelector('.message-content');
}

function appendStreamMessage() {
  const div = document.createElement('div');
  div.className = 'message';
  const id = 'stream-' + Date.now();
  div.innerHTML = `
    <div class="message-avatar">✦</div>
    <div class="message-content" id="${id}"><span class="spinner"></span></div>
  `;
  chatMessages.appendChild(div);
  chatMessages.scrollTop = chatMessages.scrollHeight;
  return { el: document.getElementById(id) };
}

function toggleVisionInput() {
  document.getElementById('vision-input').style.display =
    document.getElementById('opt-vision').checked ? 'flex' : 'none';
}

function handleChatKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendChat();
  }
}

async function sendChat() {
  const input = document.getElementById('chat-input').value.trim();
  if (!input) return;

  const model = document.getElementById('chat-model').value;
  const stream = document.getElementById('opt-stream').checked;
  const thinking = document.getElementById('opt-thinking').checked;
  const vision = document.getElementById('opt-vision').checked;
  const imageUrl = document.getElementById('chat-image-url').value.trim();

  document.getElementById('chat-input').value = '';
  document.getElementById('send-btn').disabled = true;

  const content = vision && imageUrl
    ? [{ type: 'text', text: input }, { type: 'image_url', image_url: { url: imageUrl } }]
    : input;

  chatHistory.push({ role: 'user', content });
  appendMessage('user', input + (vision && imageUrl ? `\n[图片: ${imageUrl}]` : ''));

  const body = { model, messages: chatHistory, stream, thinking };

  try {
    if (stream) {
      const { el } = appendStreamMessage();
      let fullContent = '';
      el.innerHTML = '';

      const response = await fetch('/api/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body),
      });

      const reader = response.body.getReader();
      const decoder = new TextDecoder();

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;
        const text = decoder.decode(value);
        for (const line of text.split('\n')) {
          if (line.startsWith('data: ') && line !== 'data: [DONE]') {
            try {
              const json = JSON.parse(line.slice(6));
              const delta = json.choices?.[0]?.delta?.content || '';
              if (delta) {
                fullContent += delta;
                el.innerHTML = escapeHtml(fullContent);
                chatMessages.scrollTop = chatMessages.scrollHeight;
              }
            } catch (_) {}
          }
        }
      }
      chatHistory.push({ role: 'assistant', content: fullContent });
    } else {
      const { el } = appendStreamMessage();
      const r = await fetch('/api/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body),
      });
      const d = await r.json();
      if (d.error) {
        el.innerHTML = `<span style="color:var(--red)">错误: ${escapeHtml(d.error)}</span>`;
      } else {
        const content = d.choices?.[0]?.message?.content || '';
        el.innerHTML = escapeHtml(content);
        chatHistory.push({ role: 'assistant', content });
      }
    }
  } catch (e) {
    showToast('请求失败: ' + e.message, 'error');
  } finally {
    document.getElementById('send-btn').disabled = false;
    chatMessages.scrollTop = chatMessages.scrollHeight;
  }
}

/** Upload files via FormData, return array of {name, dataUri} */
async function uploadFiles(files) {
  const fd = new FormData();
  for (const f of files) fd.append('images', f);
  const r = await fetch('/api/upload-multi', { method: 'POST', body: fd });
  const d = await r.json();
  return d.dataUris || [];
}

/** Convert a URL to data URI via server */
async function urlToDataUri(url) {
  const r = await fetch('/api/url-to-datauri', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ url }),
  });
  const d = await r.json();
  if (d.error) throw new Error(d.error);
  return d.dataUri;
}

/** Setup drag-and-drop on an upload zone */
function setupDragDrop(zoneId, fileInputId, previewListId, storedListRef, updateFn) {
  const zone = document.getElementById(zoneId);
  if (!zone) return;

  // Prevent default drag behaviors
  ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(evt => {
    zone.addEventListener(evt, e => { e.preventDefault(); e.stopPropagation(); });
  });

  ['dragenter', 'dragover'].forEach(evt => {
    zone.addEventListener(evt, () => zone.classList.add('drag-over'));
  });
  ['dragleave', 'drop'].forEach(evt => {
    zone.addEventListener(evt, () => zone.classList.remove('drag-over'));
  });

  zone.addEventListener('drop', async (e) => {
    // Windows drag-drop may not set MIME type — check both type and extension
    const IMG_EXTS = ['png', 'jpg', 'jpeg', 'gif', 'webp', 'bmp', 'svg', 'ico', 'tiff', 'tif'];
    const files = Array.from(e.dataTransfer.files).filter(f => {
      if (f.type && f.type.startsWith('image/')) return true;
      // Fallback: check file extension when MIME type is empty (common on Windows drag)
      const ext = f.name.includes('.') ? f.name.split('.').pop().toLowerCase() : '';
      return IMG_EXTS.includes(ext);
    });
    if (!files.length) {
      showToast('未检测到有效的图片文件', 'error');
      return;
    }

    try {
      const results = await uploadFiles(files);
      storedListRef.length = 0;
      storedListRef.push(...results.map(r => r.dataUri));
      updateFn();
      zone.classList.add('has-file');
      showToast(`已上传 ${results.length} 张图片`, 'success');
    } catch (err) {
      showToast('上传失败: ' + err.message, 'error');
    }
  });
}

/** Render preview thumbnails using DOM API (avoids innerHTML issues with large data URIs) */
function renderPreviews(containerId, items, storageName) {
  const container = document.getElementById(containerId);
  // Clear first
  while (container.firstChild) container.removeChild(container.firstChild);

  if (!items || !items.length) return;

  items.forEach((uri, i) => {
    const div = document.createElement('div');
    div.className = 'upload-preview-item';

    const img = document.createElement('img');
    img.src = uri;
    img.alt = 'preview';
    img.onerror = function() {
      this.style.display = 'none';
      const fallback = document.createElement('span');
      fallback.textContent = '🖼';
      fallback.style.cssText = 'display:flex;align-items:center;justify-content:center;width:100%;height:100%;font-size:24px;';
      div.insertBefore(fallback, div.firstChild);
    };

    const btn = document.createElement('button');
    btn.className = 'remove-btn';
    btn.textContent = '✕';
    // Use closure to capture current index and storage name
    btn.onclick = (function(idx, cid, sname) {
      return function() { removeUploadItem(idx, cid, sname); };
    })(i, containerId, storageName);

    div.appendChild(img);
    div.appendChild(btn);
    container.appendChild(div);
  });
}

async function generateImage() {
  const model = document.getElementById('image-model').value;
  const mode = document.getElementById('img-mode').value;
  let size = document.getElementById('img-size').value;
  const style = document.getElementById('img-style').value;
  const promptText = document.getElementById('img-prompt').value.trim();
  const urlInput = document.getElementById('img-url-input').value.trim();

  // Custom size
  if (size === 'custom') {
    const w = parseInt(document.getElementById('img-custom-w').value) || 1024;
    const h = parseInt(document.getElementById('img-custom-h').value) || 768;
    size = `${w}x${h}`;
  }

  if (!promptText) { showToast('请输入提示词', 'error'); return; }

  const prompt = style ? `${promptText}, ${style}` : promptText;

  // Collect images: uploaded files first, then URL input
  let images = [...imgUploadedUris];

  if (mode !== 'text2img') {
    // If URL input is provided and no files uploaded, try to convert URL
    if (!images.length && urlInput) {
      try {
        const dataUri = await urlToDataUri(urlInput);
        images = [dataUri];
      } catch (err) {
        showToast('图片 URL 下载失败: ' + err.message, 'error');
        return;
      }
    }
    if (!images.length) { showToast('请上传参考图片或输入图片 URL', 'error'); return; }
  }

  const btn = document.getElementById('img-gen-btn');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span> 生成中...';
  document.getElementById('img-result').style.display = 'none';

  try {
    const r = await fetch('/api/image/generate', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model, prompt, size,
        images: images.length ? images : undefined,
        responseFormat: 'url',
      }),
    });
    const d = await r.json();

    if (d.error) {
      showToast('生成失败: ' + d.error, 'error');
    } else {
      const url = d.data?.[0]?.url;
      if (url) {
        document.getElementById('result-img').src = url;
        document.getElementById('result-img-link').href = url;
        document.getElementById('result-img-info').textContent = `尺寸: ${size}`;
        document.getElementById('img-result').style.display = 'block';
        showToast('图像生成成功！', 'success');
      }
    }
  } catch (e) {
    showToast('请求失败: ' + e.message, 'error');
  } finally {
    btn.disabled = false;
    btn.textContent = '🎨 生成图像';
  }
}

let videoPollingTimer = null;

async function generateVideo() {
  const model = document.getElementById('video-model').value;
  const mode = document.getElementById('vid-mode').value;
  const prompt = document.getElementById('vid-prompt').value.trim();
  const negative = document.getElementById('vid-negative').value.trim();

  // Read video params — handle custom values
  let size = document.getElementById('vid-size').value;
  if (size === 'custom') size = document.getElementById('vid-custom-size').value.trim() || '1216x832';

  let numFrames = document.getElementById('vid-frames').value;
  if (numFrames === 'custom') numFrames = parseInt(document.getElementById('vid-custom-frames').value) || 121;
  else numFrames = parseInt(numFrames);

  const frameRate = 24; // default FPS, can be extended if API supports it

  const urlInput = document.getElementById('vid-url-input').value.trim();

  if (!prompt) { showToast('请输入视频描述', 'error'); return; }

  // Collect images: uploaded files first, then URL input
  let image = undefined;

  if (mode !== 'text2vid') {
    if (vidUploadedUris.length > 0) {
      // Use uploaded images (already data URIs)
      image = vidUploadedUris.length === 1 ? vidUploadedUris[0] : [...vidUploadedUris];
    } else if (urlInput) {
      // Convert URL to data URI
      try {
        const dataUri = await urlToDataUri(urlInput);
        image = dataUri;
      } catch (err) {
        showToast('图片 URL 下载失败: ' + err.message, 'error');
        return;
      }
    } else {
      showToast('请上传参考图片或输入图片 URL', 'error');
      return;
    }
  }

  const btn = document.getElementById('vid-gen-btn');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span> 提交任务中...';

  const progressDiv = document.getElementById('vid-progress');
  progressDiv.style.display = 'block';
  document.getElementById('vid-result').style.display = 'none';
  document.getElementById('vid-result-link').style.display = 'none';
  document.getElementById('vid-bar').style.width = '0%';
  document.getElementById('vid-progress-text').textContent = '0%';
  document.getElementById('vid-status-text').textContent = '创建任务中...';

  try {
    const r = await fetch('/api/video/create', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model, prompt, image, size, numFrames, frameRate,
        mode: mode === 'keyframes' ? 'keyframes' : undefined,
        negativePrompt: negative || undefined,
      }),
    });
    const task = await r.json();

    if (task.error) {
      showToast('任务创建失败: ' + task.error, 'error');
      btn.disabled = false;
      btn.textContent = '🎬 生成视频';
      return;
    }

    const videoId = task.video_id;
    document.getElementById('vid-status-text').textContent = `任务已创建，video_id: ${videoId}`;

    if (videoPollingTimer) clearInterval(videoPollingTimer);

    videoPollingTimer = setInterval(async () => {
      try {
        const sr = await fetch(`/api/video/status/${videoId}`);
        const sd = await sr.json();

        const progress = sd.progress || 0;
        document.getElementById('vid-bar').style.width = progress + '%';
        document.getElementById('vid-progress-text').textContent = progress + '%';
        document.getElementById('vid-status-text').textContent = `生成中... ${progress}% [${sd.status}]`;

        if (sd.status === 'completed') {
          clearInterval(videoPollingTimer);
          const videoUrl = sd.remixed_from_video_id;
          document.getElementById('vid-status-text').textContent = '✓ 视频生成完成！';

          if (videoUrl && videoUrl.startsWith('http')) {
            const vidEl = document.getElementById('vid-result');
            vidEl.src = videoUrl;
            vidEl.style.display = 'block';
            const linkEl = document.getElementById('vid-dl-link');
            linkEl.href = videoUrl;
            document.getElementById('vid-result-link').style.display = 'block';
            showToast('视频生成成功！', 'success');
          }
          btn.disabled = false;
          btn.textContent = '🎬 生成视频';
        } else if (sd.status === 'failed') {
          clearInterval(videoPollingTimer);
          const errMsg = sd.error ? JSON.stringify(sd.error) : '未知错误';
          document.getElementById('vid-status-text').textContent = `✗ 视频生成失败: ${errMsg}`;
          showToast('视频生成失败: 图片链接无法访问，请使用上传功能', 'error');
          btn.disabled = false;
          btn.textContent = '🎬 生成视频';
        }
      } catch (e) {
        // ignore polling errors
      }
    }, 5000);

  } catch (e) {
    showToast('请求失败: ' + e.message, 'error');
    btn.disabled = false;
    btn.textContent = '🎬 生成视频';
  }
}

// ============================================================================
// Initialize drag-and-drop
// ============================================================================
setupDragDrop('img-upload-zone', 'img-upload-file', 'img-preview-list', imgUploadedUris, updateImgPreviews);
setupDragDrop('vid-upload-zone', 'vid-upload-file', 'vid-preview-list', vidUploadedUris, updateVidPreviews);

// ============================================================================
// Config modal overlay click
// ============================================================================
document.getElementById('config-modal').addEventListener('click', function(e) {
  if (e.target === this) closeConfig();
});
</script>
</body>
</html>
